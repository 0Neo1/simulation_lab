<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Ohm's Law Verification</title>
<link rel="stylesheet" href="/simulations/_shared.css" />
</head>
<body>
<div class="app">
  <header>
    <h1>Ohm's Law — V vs I Plot</h1>
    <span class="pill">Class 12 · Physics</span>
  </header>
  <div class="grid">
    <div class="card">
      <h2>Circuit & V–I Graph</h2>
      <div class="viz"><canvas id="cv" width="780" height="380"></canvas></div>
      <p class="note">Vary the voltage with the slider. Each reading is plotted on the V–I graph. The slope gives the resistance R.</p>
    </div>
    <div class="card controls">
      <h2>Controls</h2>
      <label>True Resistance R (Ω)
        <input id="R" type="number" value="5" min="0.5" step="0.1" />
      </label>
      <label>Applied Voltage V (V) — <span id="vv">2</span></label>
      <input id="V" type="range" min="0" max="10" step="0.1" value="2" />
      <button class="btn" id="record">Record Reading</button>
      <button class="btn warn" id="clear">Clear</button>
      <button class="btn secondary" id="reset">Reset</button>
      <div class="values">
        <div class="value"><div class="label">Voltmeter V</div><div class="v" id="vm">2.0 V</div></div>
        <div class="value"><div class="label">Ammeter I</div><div class="v" id="am">0.40 A</div></div>
        <div class="value"><div class="label">Computed R</div><div class="v" id="Rc">5.00 Ω</div></div>
        <div class="value"><div class="label">Readings</div><div class="v" id="cnt">0</div></div>
      </div>
    </div>
  </div>
</div>
<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const R = document.getElementById('R');
const V = document.getElementById('V');
const vv = document.getElementById('vv');
const readings = [];
function update() {
  const r = parseFloat(R.value) || 1;
  const v = parseFloat(V.value);
  const i = v / r;
  vv.textContent = v.toFixed(1);
  document.getElementById('vm').textContent = v.toFixed(2) + ' V';
  document.getElementById('am').textContent = i.toFixed(3) + ' A';
  document.getElementById('Rc').textContent = (i > 0 ? (v / i).toFixed(2) : '—') + ' Ω';
  draw(v, i, r);
}
function draw(v, i, r) {
  const W = cv.width, H = cv.height;
  ctx.fillStyle = '#0b1220'; ctx.fillRect(0, 0, W, H);
  // Circuit area on left half
  drawCircuit(20, 20, 360, H - 40, v, i);
  // Graph on right half
  drawGraph(400, 20, 360, H - 40, r);
}
function drawCircuit(x, y, w, h, v, i) {
  const cx = x + w / 2, cy = y + h / 2;
  ctx.strokeStyle = '#475569'; ctx.lineWidth = 2;
  ctx.strokeRect(x + 30, y + 50, w - 60, h - 110);
  // Battery
  ctx.fillStyle = '#fbbf24';
  ctx.fillRect(cx - 14, y + h - 70, 4, 28);
  ctx.fillRect(cx + 8, y + h - 64, 4, 16);
  ctx.fillStyle = '#cbd5e1'; ctx.font = '11px Arial';
  ctx.fillText(v.toFixed(2) + ' V', cx - 12, y + h - 75);
  // Resistor (top)
  ctx.fillStyle = '#7c3aed';
  ctx.fillRect(cx - 35, y + 40, 70, 22);
  ctx.fillStyle = '#fff'; ctx.font = '11px Arial';
  ctx.fillText('R', cx - 5, y + 56);
  // Ammeter
  ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(x + 50, y + 50, 18, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = '#fbbf24'; ctx.font = 'bold 11px Arial';
  ctx.fillText('A', x + 46, y + 54);
  // Voltmeter (across resistor)
  ctx.beginPath(); ctx.arc(cx, y + 18, 16, 0, Math.PI * 2); ctx.strokeStyle = '#94a3b8'; ctx.stroke();
  ctx.fillStyle = '#67e8f9'; ctx.fillText('V', cx - 4, y + 22);
  // Animated electrons
  const t = Date.now() / 800;
  const speed = Math.min(1, i / 2);
  for (let k = 0; k < 6; k++) {
    const phase = (t + k / 6) % 1;
    const px = x + 30 + (w - 60) * phase;
    ctx.fillStyle = '#06b6d4';
    ctx.beginPath(); ctx.arc(px, y + h - 60, 3 + speed * 2, 0, Math.PI * 2); ctx.fill();
  }
  // labels
  ctx.fillStyle = '#cbd5e1'; ctx.font = '12px Arial';
  ctx.fillText('Circuit', x + 6, y + 14);
}
function drawGraph(x, y, w, h, r) {
  ctx.fillStyle = 'rgba(15,23,42,0.6)'; ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = '#475569'; ctx.strokeRect(x, y, w, h);
  // axes
  ctx.strokeStyle = '#cbd5e1'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(x + 40, y + h - 30); ctx.lineTo(x + w - 10, y + h - 30); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x + 40, y + h - 30); ctx.lineTo(x + 40, y + 10); ctx.stroke();
  ctx.fillStyle = '#94a3b8'; ctx.font = '11px Arial';
  ctx.fillText('I (A)', x + w / 2 - 10, y + h - 12);
  ctx.save();
  ctx.translate(x + 14, y + h / 2); ctx.rotate(-Math.PI / 2);
  ctx.fillText('V (volts)', 0, 0);
  ctx.restore();
  // ideal line
  const Imax = 10 / r;
  const xScale = (w - 60) / Imax;
  const yScale = (h - 50) / 10;
  ctx.strokeStyle = 'rgba(99,102,241,0.4)'; ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.moveTo(x + 40, y + h - 30); ctx.lineTo(x + 40 + xScale * Imax, y + h - 30 - yScale * 10); ctx.stroke();
  ctx.setLineDash([]);
  // recorded points
  ctx.fillStyle = '#fbbf24';
  readings.forEach(p => {
    const px = x + 40 + p.i * xScale;
    const py = y + h - 30 - p.v * yScale;
    ctx.beginPath(); ctx.arc(px, py, 4, 0, Math.PI * 2); ctx.fill();
  });
  if (readings.length >= 2) {
    // slope line through readings
    const xs = readings.map(p => p.i), ys = readings.map(p => p.v);
    const meanX = xs.reduce((a, b) => a + b, 0) / xs.length;
    const meanY = ys.reduce((a, b) => a + b, 0) / ys.length;
    let num = 0, den = 0;
    for (let k = 0; k < xs.length; k++) { num += (xs[k] - meanX) * (ys[k] - meanY); den += (xs[k] - meanX) ** 2; }
    const slope = den !== 0 ? num / den : r;
    ctx.strokeStyle = '#34d399'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(x + 40, y + h - 30); ctx.lineTo(x + 40 + xScale * Imax, y + h - 30 - yScale * (slope * Imax)); ctx.stroke();
    ctx.fillStyle = '#34d399'; ctx.font = 'bold 11px Arial';
    ctx.fillText('Slope = R = ' + slope.toFixed(2) + ' Ω', x + 50, y + 24);
  }
}
['change', 'input'].forEach(ev => {
  R.addEventListener(ev, update);
  V.addEventListener(ev, update);
});
document.getElementById('record').addEventListener('click', () => {
  const r = parseFloat(R.value) || 1;
  const v = parseFloat(V.value);
  const i = v / r;
  readings.push({ v, i });
  document.getElementById('cnt').textContent = readings.length;
  update();
});
document.getElementById('clear').addEventListener('click', () => {
  readings.length = 0;
  document.getElementById('cnt').textContent = 0;
  update();
});
document.getElementById('reset').addEventListener('click', () => {
  R.value = '5'; V.value = '2'; readings.length = 0;
  document.getElementById('cnt').textContent = 0; update();
});
setInterval(update, 60);
update();
</script>
</body>
</html>
