<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Flame Test — Metal Ions</title>
<link rel="stylesheet" href="/simulations/_shared.css" />
</head>
<body>
<div class="app">
  <header>
    <h1>Flame Test — Identify Metal Ions</h1>
    <span class="pill">Class 11 · Chemistry</span>
  </header>
  <div class="grid">
    <div class="card">
      <h2>Bunsen Flame</h2>
      <div class="viz"><canvas id="cv" width="780" height="380"></canvas></div>
      <p class="note">Click a salt to dip the platinum wire into it and hold over the non-luminous flame.</p>
    </div>
    <div class="card controls">
      <h2>Salts</h2>
      <div class="row" id="salts"></div>
      <button class="btn warn" id="clean">Clean Wire</button>
      <button class="btn secondary" id="reset">Reset</button>
      <div class="values" style="grid-template-columns:1fr">
        <div class="value"><div class="label">Salt</div><div class="v" id="s">—</div></div>
        <div class="value"><div class="label">Flame colour</div><div class="v" id="c">—</div></div>
        <div class="value"><div class="label">Metal ion</div><div class="v" id="i">—</div></div>
      </div>
    </div>
  </div>
</div>
<script>
const cv = document.getElementById('cv'); const ctx = cv.getContext('2d');
const salts = [
  { name: 'NaCl', colour: 'Golden yellow', ion: 'Na⁺', rgb: [251, 191, 36] },
  { name: 'KCl', colour: 'Lilac', ion: 'K⁺', rgb: [196, 181, 253] },
  { name: 'CaCl₂', colour: 'Brick red', ion: 'Ca²⁺', rgb: [220, 38, 38] },
  { name: 'SrCl₂', colour: 'Crimson', ion: 'Sr²⁺', rgb: [225, 29, 72] },
  { name: 'CuCl₂', colour: 'Bluish-green', ion: 'Cu²⁺', rgb: [16, 185, 129] },
  { name: 'BaCl₂', colour: 'Apple green', ion: 'Ba²⁺', rgb: [132, 204, 22] },
];
let active = null;
const cont = document.getElementById('salts');
salts.forEach((s, i) => {
  const b = document.createElement('button');
  b.className = 'btn'; b.textContent = s.name;
  b.style.background = `linear-gradient(90deg, rgb(${s.rgb.join(',')}), #1e293b)`;
  b.addEventListener('click', () => { active = i; updateVals(); });
  cont.appendChild(b);
});
function updateVals() {
  if (active === null) return;
  const s = salts[active];
  document.getElementById('s').textContent = s.name;
  document.getElementById('c').textContent = s.colour;
  document.getElementById('i').textContent = s.ion;
}
function draw() {
  const W = cv.width, H = cv.height;
  ctx.fillStyle = '#0b1220'; ctx.fillRect(0, 0, W, H);
  // Bunsen burner
  ctx.fillStyle = '#475569'; ctx.fillRect(W / 2 - 30, H - 60, 60, 50);
  ctx.fillStyle = '#1e293b'; ctx.fillRect(W / 2 - 14, 200, 28, H - 240);
  // flame
  const flameColor = active !== null ? salts[active].rgb : [37, 99, 235];
  for (let i = 0; i < 25; i++) {
    const t = i / 24;
    const y = 200 - t * 140;
    const w = (1 - t) * 36;
    const phase = Date.now() / 200 + i * 0.5;
    const wob = Math.sin(phase) * 4;
    const innerA = 0.55 + Math.sin(phase * 1.3) * 0.15;
    ctx.fillStyle = `rgba(${flameColor[0]},${flameColor[1]},${flameColor[2]},${innerA})`;
    ctx.beginPath();
    ctx.ellipse(W / 2 + wob, y, w + 4, 10, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  // platinum wire (bent)
  ctx.strokeStyle = '#cbd5e1'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(W / 2 + 100, 200); ctx.lineTo(W / 2 + 30, 110); ctx.lineTo(W / 2 + 10, 110); ctx.stroke();
  ctx.fillStyle = '#cbd5e1'; ctx.font = '12px Arial';
  ctx.fillText('Pt wire', W / 2 + 100, 195);
  if (active !== null) {
    ctx.fillStyle = `rgb(${flameColor.join(',')})`;
    ctx.font = 'bold 16px Arial';
    ctx.fillText(salts[active].colour + ' flame', 30, 30);
  }
  requestAnimationFrame(draw);
}
document.getElementById('clean').addEventListener('click', () => { active = null;
  ['s', 'c', 'i'].forEach(id => document.getElementById(id).textContent = '—');
});
document.getElementById('reset').addEventListener('click', () => { active = null;
  ['s', 'c', 'i'].forEach(id => document.getElementById(id).textContent = '—');
});
draw();
</script>
</body>
</html>
