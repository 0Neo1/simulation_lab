<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Simple Pendulum</title><link rel="stylesheet" href="../styles.css"></head>
<body>
<header><a href="../index.html"><h1>Simple Pendulum</h1></a><p>Length, gravity, and damping affect the period.</p></header>
<main>
<a class="back-link" href="../index.html">&larr; All simulations</a>
<div class="sim-container">
  <div>
    <div class="canvas-wrap"><canvas id="cv" width="800" height="500"></canvas></div>
    <div class="info-box">
      <h3>The Physics</h3>
      <p>For small angles, the period of a simple pendulum is independent of mass and amplitude.</p>
      <div class="formula">T = 2π √(L/g)</div>
      <p>Equation of motion: <em>θ̈ = −(g/L) sin θ − b·θ̇</em></p>
    </div>
  </div>
  <div class="controls">
    <h3>Controls</h3>
    <div class="control-row"><label>Length <span class="val" id="vL">2.0 m</span></label><input type="range" id="L" min="5" max="50" value="20"></div>
    <div class="control-row"><label>Gravity <span class="val" id="vG">9.8</span></label><input type="range" id="g" min="1" max="25" value="98"></div>
    <div class="control-row"><label>Initial Angle <span class="val" id="vA">30°</span></label><input type="range" id="a0" min="-90" max="90" value="30"></div>
    <div class="control-row"><label>Damping <span class="val" id="vB">0.05</span></label><input type="range" id="b" min="0" max="50" value="5"></div>
    <div class="btn-row"><button id="run">Start</button><button class="secondary" id="pause">Pause</button><button class="danger" id="reset">Reset</button></div>
    <div class="readouts">
      <div>θ: <span id="rTh">0°</span></div>
      <div>ω: <span id="rW">0</span></div>
      <div>Period: <span id="rT">0 s</span></div>
      <div>KE+PE: <span id="rE">0 J</span></div>
    </div>
  </div>
</div>
</main>
<script>
const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
let L = 2.0, g = 9.8, theta = 30*Math.PI/180, omega = 0, b = 0.05;
let running = false;
const px = 400, py = 80, scale = 100;
const m = 1;

function step(){
  if(!running) return;
  const dt = 0.02;
  // RK4 would be nicer but Euler with small dt is fine
  const alpha = -(g/L)*Math.sin(theta) - b*omega;
  omega += alpha*dt;
  theta += omega*dt;
  draw();
  document.getElementById('rTh').textContent = (theta*180/Math.PI).toFixed(1)+'°';
  document.getElementById('rW').textContent = omega.toFixed(2)+' rad/s';
  document.getElementById('rT').textContent = (2*Math.PI*Math.sqrt(L/g)).toFixed(2)+' s';
  const h = L*(1-Math.cos(theta));
  const E = 0.5*m*L*L*omega*omega + m*g*h;
  document.getElementById('rE').textContent = E.toFixed(2)+' J';
  requestAnimationFrame(step);
}

function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  // ceiling
  ctx.fillStyle = '#888'; ctx.fillRect(px-60, py-15, 120, 15);
  for(let i=0;i<10;i++){
    ctx.beginPath(); ctx.moveTo(px-60+i*12, py); ctx.lineTo(px-50+i*12, py-15); ctx.strokeStyle='#444'; ctx.stroke();
  }
  // string
  const bx = px + L*scale*Math.sin(theta);
  const by = py + L*scale*Math.cos(theta);
  ctx.strokeStyle = '#888888'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(bx,by); ctx.stroke();
  // arc trace
  ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(px, py, L*scale, Math.PI/2-Math.abs(theta), Math.PI/2+Math.abs(theta)); ctx.stroke();
  // bob
  ctx.fillStyle = '#888888'; ctx.beginPath(); ctx.arc(bx, by, 18, 0, 2*Math.PI); ctx.fill();
  ctx.strokeStyle = '#dddddd'; ctx.stroke();
  // pivot
  ctx.fillStyle = '#dddddd'; ctx.beginPath(); ctx.arc(px,py,4,0,2*Math.PI); ctx.fill();
}

document.getElementById('L').oninput = e=>{L=+e.target.value/10; document.getElementById('vL').textContent=L.toFixed(1)+' m'; if(!running) draw();};
document.getElementById('g').oninput = e=>{g=+e.target.value/10; document.getElementById('vG').textContent=g.toFixed(1);};
document.getElementById('a0').oninput = e=>{ theta = +e.target.value*Math.PI/180; document.getElementById('vA').textContent=e.target.value+'°'; if(!running){omega=0; draw();}};
document.getElementById('b').oninput = e=>{b=+e.target.value/100; document.getElementById('vB').textContent=b.toFixed(2);};
document.getElementById('run').onclick = ()=>{ if(!running){running=true; step();}};
document.getElementById('pause').onclick = ()=>{ running=false; };
document.getElementById('reset').onclick = ()=>{ running=false; theta=+document.getElementById('a0').value*Math.PI/180; omega=0; draw(); };
draw();
</script>
</body></html>
