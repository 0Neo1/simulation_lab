<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Coulomb's Law</title><link rel="stylesheet" href="../styles.css"></head>
<body>
<header><a href="../index.html"><h1>Coulomb's Law</h1></a><p>Drag the charges; see force vectors.</p></header>
<main>
<a class="back-link" href="../index.html">&larr; All simulations</a>
<div class="sim-container">
  <div>
    <div class="canvas-wrap"><canvas id="cv" width="800" height="500"></canvas></div>
    <div class="info-box">
      <h3>The Physics</h3>
      <p>Like charges repel, opposite charges attract. The force is along the line joining them and decreases with the square of distance.</p>
      <div class="formula">F = k q₁ q₂ / r²</div>
    </div>
  </div>
  <div class="controls">
    <h3>Controls</h3>
    <div class="control-row"><label>Charge 1 (μC) <span class="val" id="vQ1">+5</span></label><input type="range" id="q1" min="-10" max="10" value="5"></div>
    <div class="control-row"><label>Charge 2 (μC) <span class="val" id="vQ2">-5</span></label><input type="range" id="q2" min="-10" max="10" value="-5"></div>
    <div class="readouts">
      <div>r: <span id="rR">0</span> m</div>
      <div>F: <span id="rF">0</span> N</div>
    </div>
  </div>
</div>
</main>
<script>
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let q1=5, q2=-5;
let p1={x:300,y:250}, p2={x:550,y:250};
let drag=null;
const k = 9e9;

function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.fillStyle='#0a0a0a'; ctx.fillRect(0,0,cv.width,cv.height);
  // grid
  ctx.strokeStyle='#222222';
  for(let i=0;i<cv.width;i+=40){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,cv.height);ctx.stroke();}
  for(let j=0;j<cv.height;j+=40){ctx.beginPath();ctx.moveTo(0,j);ctx.lineTo(cv.width,j);ctx.stroke();}
  // distance and force
  const dx=p2.x-p1.x, dy=p2.y-p1.y, r = Math.hypot(dx,dy);
  const r_m = r/100; // 100px = 1m
  const F = k*Math.abs(q1*q2)*1e-12/(r_m*r_m+0.0001);
  const sameSign = q1*q2 > 0;
  // force arrows
  const ux=dx/r, uy=dy/r;
  const Fmag = Math.min(F*5, 100);
  // on q1
  const dir1 = sameSign ? -1 : 1;
  drawArrow(p1.x, p1.y, p1.x + dir1*ux*Fmag, p1.y + dir1*uy*Fmag, '#888888');
  // on q2
  const dir2 = sameSign ? 1 : -1;
  drawArrow(p2.x, p2.y, p2.x + dir2*ux*Fmag, p2.y + dir2*uy*Fmag, '#888888');
  // line
  ctx.strokeStyle='#888'; ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();
  ctx.setLineDash([]);
  // charges
  drawCharge(p1.x, p1.y, q1);
  drawCharge(p2.x, p2.y, q2);
  document.getElementById('rR').textContent = r_m.toFixed(2);
  document.getElementById('rF').textContent = F.toExponential(2);
}
function drawCharge(x,y,q){
  const color = q>0?'#888888':'#ffffff';
  ctx.fillStyle=color;
  ctx.beginPath(); ctx.arc(x,y,18,0,2*Math.PI); ctx.fill();
  ctx.strokeStyle='#dddddd'; ctx.lineWidth=2; ctx.stroke();
  ctx.fillStyle='#fff'; ctx.font='bold 18px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(q>0?'+':'−', x, y);
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
}
function drawArrow(x1,y1,x2,y2,c){
  ctx.strokeStyle=c; ctx.fillStyle=c; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  const a=Math.atan2(y2-y1,x2-x1);
  ctx.beginPath(); ctx.moveTo(x2,y2);
  ctx.lineTo(x2-10*Math.cos(a-0.4),y2-10*Math.sin(a-0.4));
  ctx.lineTo(x2-10*Math.cos(a+0.4),y2-10*Math.sin(a+0.4));
  ctx.closePath(); ctx.fill();
}
cv.onmousedown=e=>{
  const r=cv.getBoundingClientRect(),s=cv.width/r.width;
  const mx=(e.clientX-r.left)*s, my=(e.clientY-r.top)*s;
  if(Math.hypot(mx-p1.x,my-p1.y)<22) drag='1';
  else if(Math.hypot(mx-p2.x,my-p2.y)<22) drag='2';
};
cv.onmousemove=e=>{
  if(!drag) return;
  const r=cv.getBoundingClientRect(),s=cv.width/r.width;
  const mx=(e.clientX-r.left)*s, my=(e.clientY-r.top)*s;
  if(drag==='1'){p1.x=mx; p1.y=my;} else {p2.x=mx; p2.y=my;}
  draw();
};
cv.onmouseup=()=>drag=null;
document.getElementById('q1').oninput=e=>{q1=+e.target.value; document.getElementById('vQ1').textContent=(q1>=0?'+':'')+q1; draw();};
document.getElementById('q2').oninput=e=>{q2=+e.target.value; document.getElementById('vQ2').textContent=(q2>=0?'+':'')+q2; draw();};
draw();
</script>
</body></html>
